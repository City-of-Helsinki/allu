<ng-container *ngIf="content">
  <div class="history-field-label text-primary">{{content.uiFieldName}}</div>
  <div class="history-field-value">
    <span>{{content.oldValue}}</span>
    <span><mat-icon class="icon-middle">arrow_forward</mat-icon></span>
    <span>{{content.newValue}}</span>
  </div>
</ng-container>
